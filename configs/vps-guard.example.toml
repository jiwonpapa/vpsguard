schema_version = 1

[edge]
http_bind = "127.0.0.1:18080"
allowed_hosts = ["example.com", "www.example.com"]
canonical_host = "example.com"
trusted_proxy_cidrs = []
max_body_bytes = 1048576
upload_max_body_bytes = 52428800
upload_path_prefixes = ["/upload"]
strict_path_prefixes = ["/login", "/search"]
upstream_connect_timeout_ms = 3000
upstream_read_timeout_ms = 30000
upload_upstream_read_timeout_ms = 60000
max_tracked_clients = 10000
strict_rate_limit_rpm = 60
upload_rate_limit_rpm = 30
telemetry_socket = "/run/vps-guard/telemetry.sock"
policy_path = "/var/lib/vps-guard/policy.json"
policy_reload_interval_ms = 1000
clearance_ttl_seconds = 600

[origin]
address = "127.0.0.1:18081"
protocol = "http"

[tls]
# auto는 기존 Certbot renewal·timer를 읽기 전용으로 감지합니다.
# external_managed, vpsguard_assisted, manual을 명시할 수도 있습니다.
management = "auto"
certificates = []
# 운영 TLS에서는 systemd credential 이름을 사용합니다.
# [[tls.certificates]]
# domains = ["example.com", "www.example.com"]
# cert_file = "tls-cert.pem"
# key_file = "tls-key.pem"
# certbot_lineage = "example.com" # 기존 Certbot을 auto 감지할 때만

[ui]
bind = "127.0.0.1:7727"
# HTTPS listener와 관리 Host를 포함한 인증서를 설정한 뒤 활성화합니다.
# public_host = "guard.example.com"
admin_socket = "/run/vps-guard/admin.sock"
login_rate_limit_rpm = 10
language = "ko"

[detection]
profile = "gnuboard7"
inspection = "profiled" # app 분석 생략은 protocol_only
mode = "observe"

[cloudflare]
enabled = false
# 기본 생성 경로는 User API Token입니다.
# Zone / DNS / Edit와 특정 zone만 부여합니다. Account DNS Settings, DNS Firewall,
# DNS View와 Account API Tokens Write는 DNS record 변경에 필요하지 않습니다.
zone_id = ""
records = []
# 운영에서는 systemd credential 이름을 사용합니다. 로컬 개발만 0600 절대 경로를 허용합니다.
token_file = "cloudflare-token"
ip_networks = []
# 활성화 전 Cloudflare dashboard/API에서 ID를 확인해 record별로 추가합니다.
# [[cloudflare.records]]
# id = "0123456789abcdef0123456789abcdef"
# name = "example.com"
# record_type = "A" # A, AAAA 또는 CNAME

[retention]
live_seconds = 900
detail_hours = 24
aggregate_days = 30
incident_days = 90
audit_days = 365
raw_ip_days = 7

[storage]
database_path = "/var/lib/vps-guard/control.sqlite3"
events_directory = "/var/lib/vps-guard/events"
max_database_bytes = 536870912
min_disk_free_bytes = 268435456

[collectors]
timeout_ms = 500

# 전체 서버를 검색하지 않습니다. 실제 HTTP 처리 경로의 systemd unit만 명시합니다.
# [[collectors.services]]
# name = "nginx"
# unit = "nginx.service"
# kind = "nginx"
# status_url = "http://127.0.0.1:8081/nginx-status"
#
# [[collectors.services]]
# name = "php_fpm"
# unit = "php8.3-fpm.service"
# kind = "php_fpm"
# status_url = "http://127.0.0.1:8081/php-fpm-status"
#
# [[collectors.services]]
# name = "mysql"
# unit = "mariadb.service"
# kind = "mysql"
# credential_file = "mysql-monitor-url"
#
# [[collectors.services]]
# name = "redis"
# unit = "redis-server.service"
# kind = "redis"
# credential_file = "redis-monitor-url"
