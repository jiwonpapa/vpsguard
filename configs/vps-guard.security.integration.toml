schema_version = 1

[edge]
http_bind = "127.0.0.1:28083"
allowed_hosts = ["example.test"]
trusted_proxy_cidrs = []
max_body_bytes = 1024
upload_max_body_bytes = 4096
upload_path_prefixes = ["/upload"]
strict_path_prefixes = ["/login", "/search"]
upstream_connect_timeout_ms = 1000
upstream_read_timeout_ms = 3000
upload_upstream_read_timeout_ms = 5000
max_tracked_clients = 1000
rate_limit_rpm = 100
strict_rate_limit_rpm = 100
upload_rate_limit_rpm = 100
telemetry_socket = "/tmp/vps-guard-smoke/security-telemetry.sock"
policy_path = "/tmp/vps-guard-smoke/security-policy.json"
policy_reload_interval_ms = 100
clearance_ttl_seconds = 600

[origin]
address = "127.0.0.1:28081"
protocol = "http"

[tls]
certificates = []

[ui]
bind = "127.0.0.1:27729"
admin_socket = "/tmp/vps-guard-smoke/security-admin.sock"
login_rate_limit_rpm = 10
language = "ko"

[detection]
profile = "gnuboard7"
inspection = "profiled"
mode = "enforce"

[security]
baseline_response_headers = true
strip_origin_headers = true
csp_mode = "report_only"
hsts_max_age_seconds = 0
auth_rate_limit_rpm = 2

[cloudflare]
enabled = false
ip_networks = []

[retention]
live_seconds = 900
detail_hours = 24
aggregate_days = 30
incident_days = 90
audit_days = 365
raw_ip_days = 0

[storage]
database_path = "/tmp/vps-guard-smoke/security.sqlite3"
events_directory = "/tmp/vps-guard-smoke/security-events"
max_database_bytes = 536870912
min_disk_free_bytes = 67108864

[collectors]
timeout_ms = 100
