# OPS-011: Apache keeps public TLS and forwards sanitized requests to VPSGuard.
Listen 7443
<VirtualHost *:80>
    ServerName gnuboard5.local
    ServerAlias gnuboard5.test 192.168.0.143
    Redirect permanent / https://gnuboard5.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName gnuboard5.local
    ServerAlias gnuboard5.test 192.168.0.143

    SSLEngine on
    SSLCertificateFile /etc/ssl/gnuboard5/gnuboard5.local.pem
    SSLCertificateKeyFile /etc/ssl/gnuboard5/gnuboard5.local-key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    # SEC-017: 배포 transaction이 off/detection/tuned profile 중 하나만 설치합니다.
    IncludeOptional /etc/vps-guard/apache/waf-active.conf

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On
    RequestHeader unset X-Forwarded-For early
    RequestHeader unset X-Forwarded-Proto early
    RequestHeader unset X-Forwarded-Host early
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "gnuboard5.local"

    ProxyPass / http://127.0.0.1:18080/ connectiontimeout=3 timeout=65 retry=0
    ProxyPassReverse / http://127.0.0.1:18080/

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog ${APACHE_LOG_DIR}/gnuboard5-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/gnuboard5-ssl-access.log combined
</VirtualHost>

<VirtualHost *:7443>
    ServerName 192.168.0.143

    SSLEngine on
    SSLCertificateFile /etc/ssl/gnuboard5/gnuboard5.local.pem
    SSLCertificateKeyFile /etc/ssl/gnuboard5/gnuboard5.local-key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader unset X-Forwarded-For early
    RequestHeader unset X-Forwarded-Proto early
    RequestHeader unset X-Forwarded-Host early
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "192.168.0.143"
    ProxyPass / http://127.0.0.1:7727/ connectiontimeout=3 timeout=30 retry=0
    ProxyPassReverse / http://127.0.0.1:7727/

    Header always set Cache-Control "no-store"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
    Header always set X-Frame-Options "DENY"

    ErrorLog ${APACHE_LOG_DIR}/vpsguard-admin-error.log
    CustomLog ${APACHE_LOG_DIR}/vpsguard-admin-access.log combined
</VirtualHost>
