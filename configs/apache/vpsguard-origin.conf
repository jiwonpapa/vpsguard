# OPS-011: loopback-only Apache application origin.
<VirtualHost 127.0.0.1:18081>
    ServerName gnuboard5.local
    DocumentRoot /home/gnuboard5/public_html

    # OPS-011: only the loopback VPSGuard hop may restore the original client IP.
    RemoteIPHeader X-Forwarded-For
    RemoteIPInternalProxy 127.0.0.1

    <Directory /home/gnuboard5/public_html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    <FilesMatch "^(?:\.env(?:\..*)?|composer\.(?:json|lock)|\.gitignore|\.deploy_last_staging_backup)$">
        Require all denied
    </FilesMatch>

    <Directory /home/gnuboard5/public_html/api/logs>
        Require all denied
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog ${APACHE_LOG_DIR}/gnuboard5_origin_error.log
    CustomLog ${APACHE_LOG_DIR}/gnuboard5_origin_access.log combined
</VirtualHost>
