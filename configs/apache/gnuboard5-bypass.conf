# OPS-011: exact Apache direct bypass candidate.
<VirtualHost *:80>
    ServerName gnuboard5.local
    ServerAlias gnuboard5.test 192.168.0.143
    Redirect permanent / https://gnuboard5.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName gnuboard5.local
    ServerAlias gnuboard5.test 192.168.0.143
    DocumentRoot /home/gnuboard5/public_html

    SSLEngine on
    SSLCertificateFile /etc/ssl/gnuboard5/gnuboard5.local.pem
    SSLCertificateKeyFile /etc/ssl/gnuboard5/gnuboard5.local-key.pem
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    <Directory /home/gnuboard5/public_html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    <FilesMatch "^(?:\.env(?:\..*)?|composer\.(?:json|lock)|\.gitignore|\.deploy_last_staging_backup)$">
        Require all denied
    </FilesMatch>

    <Directory /home/gnuboard5/public_html/api/logs>
        Require all denied
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog ${APACHE_LOG_DIR}/gnuboard5-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/gnuboard5-ssl-access.log combined
</VirtualHost>
