# SEC-017: enable only after VM false-positive replay has approved the exclusions file.
<IfModule security2_module>
    SecRuleEngine On
    SecRequestBodyAccess On
    SecResponseBodyAccess Off
    SecAuditEngine RelevantOnly
    SecAuditLogParts ABIJDEFHZ
    SecAuditLog /var/log/apache2/vpsguard-modsecurity-audit.log
    IncludeOptional /etc/vps-guard/apache/gnuboard5-crs-exclusions.conf
</IfModule>
