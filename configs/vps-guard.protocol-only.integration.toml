schema_version = 1

[edge]
http_bind = "127.0.0.1:28082"
https_bind = "127.0.0.1:28444"
allowed_hosts = ["example.test"]
trusted_proxy_cidrs = []
max_body_bytes = 1024
upload_max_body_bytes = 4096
upload_path_prefixes = ["/upload"]
strict_path_prefixes = ["/login", "/search"]
upstream_connect_timeout_ms = 1000
upstream_read_timeout_ms = 3000
upload_upstream_read_timeout_ms = 5000
max_tracked_clients = 1000
rate_limit_rpm = 1
strict_rate_limit_rpm = 1
upload_rate_limit_rpm = 1
telemetry_socket = "/tmp/vps-guard-smoke/protocol-only-telemetry.sock"
policy_path = "/tmp/vps-guard-smoke/protocol-only-policy.json"
policy_reload_interval_ms = 100
clearance_ttl_seconds = 600

[origin]
address = "127.0.0.1:28081"
protocol = "http"

[tls]
[[tls.certificates]]
domains = ["example.test"]
cert_file = "/tmp/vps-guard-smoke/tls-cert.pem"
key_file = "/tmp/vps-guard-smoke/tls-key.pem"

[ui]
bind = "127.0.0.1:27728"
admin_socket = "/tmp/vps-guard-smoke/protocol-only-admin.sock"
login_rate_limit_rpm = 10
language = "ko"

[detection]
profile = "gnuboard7"
inspection = "protocol_only"
mode = "enforce"

[cloudflare]
enabled = false
ip_networks = []

[retention]
live_seconds = 900
detail_hours = 24
aggregate_days = 30
incident_days = 90
audit_days = 365
raw_ip_days = 0

[storage]
database_path = "/tmp/vps-guard-smoke/protocol-only.sqlite3"
events_directory = "/tmp/vps-guard-smoke/protocol-only-events"
max_database_bytes = 536870912
min_disk_free_bytes = 67108864

[collectors]
timeout_ms = 100
