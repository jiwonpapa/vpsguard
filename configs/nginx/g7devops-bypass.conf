server {
    listen 80;
    listen [::]:80;
    server_name g7devops.com www.g7devops.com;
    root /home/g7devops/public_html/public;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://www.g7devops.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name g7devops.com;
    ssl_certificate /etc/letsencrypt/live/g7devops.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/g7devops.com/privkey.pem;
    return 301 https://www.g7devops.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.g7devops.com;
    root /home/g7devops/public_html/public;
    index index.php index.html index.htm;

    ssl_certificate /etc/letsencrypt/live/g7devops.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/g7devops.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/g7-access.log;
    error_log /var/log/nginx/g7-error.log;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 88m;
    keepalive_timeout 20s;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }
    location ~ ^/apps?(/|$) {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8080;
    }


    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm-g7devops.sock;
    }

    location ~ /\. {
        deny all;
    }
}
