map $http_upgrade $vpsguard_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 127.0.0.1:18081;
    server_name g7devops.com www.g7devops.com;
    root /home/g7devops/public_html/public;
    index index.php index.html index.htm;

    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    access_log /var/log/nginx/g7-origin-access.log;
    error_log /var/log/nginx/g7-origin-error.log;

    client_max_body_size 88m;
    keepalive_timeout 20s;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location ~ ^/apps?(/|$) {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $vpsguard_connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include /etc/nginx/snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm-g7devops.sock;
    }

    location ~ /\. {
        deny all;
    }
}
