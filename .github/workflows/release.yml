name: Release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cross,cargo-cyclonedx
      - name: Build verified bundle
        env:
          CARGO_BUILD_TOOL: cross
          REQUIRE_CYCLONEDX: "1"
        run: bash scripts/build-release.sh "${{ matrix.target }}"
      - name: Verify checksums
        id: bundle
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          bundle="target/release-bundle/${{ matrix.target }}/vpsguard-${version}"
          test -d "${bundle}"
          (cd "${bundle}" && sha256sum --check SHA256SUMS)
          grep -Fxq "target=${{ matrix.target }}" "${bundle}/BUILD-INFO.txt"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) file "${bundle}/bin/vps-guard" | grep -Fq 'x86-64' ;;
            aarch64-unknown-linux-gnu) file "${bundle}/bin/vps-guard" | grep -Eq 'ARM aarch64|aarch64' ;;
          esac
          echo "path=${bundle}" >>"${GITHUB_OUTPUT}"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.bundle.outputs.path }}/bin/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vpsguard-${{ matrix.target }}
          path: ${{ steps.bundle.outputs.path }}/
          if-no-files-found: error
