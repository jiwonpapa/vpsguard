name: CI

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit,cargo-deny,cargo-machete
      - name: Install repository linters
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Repository contracts
        run: |
          bash scripts/docs-gate.sh
          bash scripts/requirements-gate.sh
          bash scripts/pr-contract-gate.sh
          bash scripts/tests/repository-contracts.sh
          actionlint
          shellcheck scripts/*.sh packaging/certbot/*
      - name: Rust quality
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
          RUSTDOCFLAGS="-D warnings" cargo doc --locked --workspace --no-deps --document-private-items
          cargo audit --ignore RUSTSEC-2024-0437
          cargo deny check
          cargo machete crates

  unit-contract:
    name: unit-contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: nextest
      - run: cargo nextest run --locked --workspace --all-features --profile ci
      - run: cargo test --locked --workspace --all-features --doc
      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: error

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-llvm-cov
      - run: bash scripts/coverage-gate.sh
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: target-evidence/coverage/
          if-no-files-found: error

  integration:
    name: integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: bash scripts/integration-gate.sh
      - run: bash scripts/ops-harness.sh
      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-evidence
          path: target-evidence/
          if-no-files-found: error

  web:
    name: web
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - run: bun ci
        working-directory: web
      - run: bun run check
        working-directory: web
      - run: git diff --exit-code -- web/dist
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: web
      - run: bun run test:e2e
        working-directory: web
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-e2e-evidence
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: error

  load-regression:
    name: load-regression
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: bash scripts/load-regression-gate.sh
      - name: Upload load evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: load-evidence
          path: target-evidence/load/
          if-no-files-found: error

  merge-gate:
    name: merge-gate
    if: always()
    needs: [quality, unit-contract, coverage, integration, web, load-regression]
    runs-on: ubuntu-24.04
    steps:
      - name: Require every gate
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT_CONTRACT: ${{ needs.unit-contract.result }}
          COVERAGE: ${{ needs.coverage.result }}
          INTEGRATION: ${{ needs.integration.result }}
          WEB: ${{ needs.web.result }}
          LOAD_REGRESSION: ${{ needs.load-regression.result }}
        run: |
          for result in "${QUALITY}" "${UNIT_CONTRACT}" "${COVERAGE}" "${INTEGRATION}" "${WEB}" "${LOAD_REGRESSION}"; do
            if [[ "${result}" != "success" ]]; then
              echo "required gate did not succeed: ${result}" >&2
              exit 1
            fi
          done
          echo "all required gates passed"
